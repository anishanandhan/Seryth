name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Check for security.txt
        run: |
          if [ -f public/.well-known/security.txt ]; then
            echo "✓ security.txt found"
          else
            echo "✗ security.txt missing"
            exit 1
          fi

      - name: Check for SECURITY.md
        run: |
          if [ -f SECURITY.md ]; then
            echo "✓ SECURITY.md found"
          else
            echo "✗ SECURITY.md missing"
            exit 1
          fi
