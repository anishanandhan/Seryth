name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: mock-api-key-for-ci-build
          PINECONE_API_KEY: mock-api-key-for-ci-build
          PINECONE_INDEX_NAME: aura-fragrances
          PINECONE_ENVIRONMENT: us-east-1-aws
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-anon-key-for-ci

      - name: Start server in background
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 120000
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: mock-api-key-for-ci-build
          PINECONE_API_KEY: mock-api-key-for-ci-build
          PINECONE_INDEX_NAME: aura-fragrances
          PINECONE_ENVIRONMENT: us-east-1-aws
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-anon-key-for-ci

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/aura
            http://localhost:3000/nexus
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: '.lighthouseci'
