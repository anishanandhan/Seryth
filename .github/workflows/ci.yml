name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Build application
        run: npm run build
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: mock-api-key-for-ci-build
          PINECONE_API_KEY: mock-api-key-for-ci-build
          PINECONE_INDEX_NAME: aura-fragrances
          PINECONE_ENVIRONMENT: us-east-1-aws
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock-anon-key-for-ci

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true

      - name: Check for security.txt
        run: |
          if [ -f public/.well-known/security.txt ]; then
            echo "✓ security.txt found"
          else
            echo "✗ security.txt missing"
            exit 1
          fi

      - name: Check for SECURITY.md
        run: |
          if [ -f SECURITY.md ]; then
            echo "✓ SECURITY.md found"
          else
            echo "✗ SECURITY.md missing"
            exit 1
          fi
